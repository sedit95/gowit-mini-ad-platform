services:
  postgres:
    image: postgres:16-alpine
    container_name: gowit-postgres
    environment:
      POSTGRES_DB: gowit_ad_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_create_campaigns_table.up.sql:/docker-entrypoint-initdb.d/001_create_campaigns_table.up.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gowit_ad_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gowit-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/gowit_ad_platform?sslmode=disable
      BACKEND_PORT: "8080"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: gowit-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
